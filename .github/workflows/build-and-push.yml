name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile'
      - 'docker/workspace-sync/Dockerfile'
      - 'config/**'
      - 'workspace-templates/**'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'docker/Dockerfile'

env:
  GHCR_PREFIX: ghcr.io/${{ github.repository_owner }}/openclaw-docker-config

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate config
        run: ./scripts/validate-config.sh

      - name: Check secrets
        run: ./scripts/check-secrets.sh

      - name: Extract version from Dockerfile
        id: version
        run: |
          VERSION=$(grep "ARG OPENCLAW_VERSION=" docker/Dockerfile | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.GHCR_PREFIX }}/openclaw-gateway:latest
            ${{ env.GHCR_PREFIX }}/openclaw-gateway:${{ steps.version.outputs.version }}
            ${{ env.GHCR_PREFIX }}/openclaw-gateway:${{ github.sha }}

      - name: Build and push workspace-sync image
        uses: docker/build-push-action@v5
        with:
          context: docker/workspace-sync
          file: docker/workspace-sync/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.GHCR_PREFIX }}/workspace-sync:latest
            ${{ env.GHCR_PREFIX }}/workspace-sync:${{ github.sha }}

      - name: Summary
        if: github.event_name == 'push'
        run: |
          echo "✓ Built and pushed images:"
          echo "  - ${{ env.GHCR_PREFIX }}/openclaw-gateway:${{ steps.version.outputs.version }}"
          echo "  - ${{ env.GHCR_PREFIX }}/workspace-sync:latest"
